name: Generate Chart

on:
  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: master-push
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate chart
        run: make generate

      - name: Commit and push changes
        run: |
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config user.name 'github-actions[bot]'
          git add chart.html
          if git diff --staged --quiet; then
            echo "No chart changes to commit."
            exit 0
          fi
          git commit -m "Update chart data - $(date +%Y-%m-%d\ %H:%M:%S)"

          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:master; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt), rebasing onto latest master and retrying..."
            git fetch origin master
            git rebase origin/master
          done

          echo "::error::Failed to push after several retries."
          exit 1