# Configure your repository - Settings -> Actions -> General -> Workflow permissions
# and choose Read and write permissions for this workflow to commit and push changes
name: Fetch Gift Card Brands

on:
  schedule:
    # Run 3 times a day: 8:00 AM, 3:00 PM, 10:00 PM UTC
    - cron: '0 8,15,22 * * *'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch gift card brands
        run: |
          mkdir -p data
          curl 'https://api.everup.uk/v1/gift-card-brands' \
            -H 'accept: application/json' \
            -H 'accept-language: en-US,en;q=0.9' \
            -H 'cache-control: no-cache' \
            -H 'expires: 0' \
            -H 'origin: https://everup.uk' \
            -H 'pragma: no-cache' \
            -H 'priority: u=1, i' \
            -H 'referer: https://everup.uk/' \
            -H 'sec-ch-ua: "Google Chrome";v="141", "Not?A_Brand";v="8", "Chromium";v="141"' \
            -H 'sec-ch-ua-mobile: ?0' \
            -H 'sec-ch-ua-platform: "Windows"' \
            -H 'sec-fetch-dest: empty' \
            -H 'sec-fetch-mode: cors' \
            -H 'sec-fetch-site: same-site' \
            -H 'user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/141.0.0.0 Safari/537.36' \
            | jq '.' > data/$(date +%Y-%m-%d_%H-%M-%S).json

      - name: Commit and push changes
        uses: actions-js/push@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: 'Update gift card data - $(date +%Y-%m-%d\ %H:%M:%S)'
          author_email: 'github-actions[bot]@users.noreply.github.com'
          author_name: 'github-actions[bot]'
          branch: 'master'

      - name: Check Tesco rewards
        id: check
        run: make check

      - name: Create notification issue
        if: steps.check.outputs.alert == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const latestFile = require('fs').readdirSync('./data').filter(f => f.endsWith('.json')).sort().pop();
            const content = require('fs').readFileSync(`./data/${latestFile}`, 'utf8');
            const data = JSON.parse(content);
            const tesco = data.brands.find(b => b.id === 'tesco');
            const perc = tesco ? (tesco.total_rewards_perc * 100).toFixed(2) : 'N/A';
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Tesco Rewards Alert',
              body: `Tesco total_rewards_perc is now ${perc}%, which is above average and previous value. Check the latest data.`,
              assignees: [context.repo.owner]
            });
